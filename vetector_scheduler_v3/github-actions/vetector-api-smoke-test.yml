name: vetector-api-smoke-test

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check health endpoint
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          test -n "$API_BASE_URL"
          curl -fsS "$API_BASE_URL/health"
      - name: Check territorial layers endpoint
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          curl -fsS "$API_BASE_URL/territorial-layers?lat=45.0703&lon=7.6869&radius_km=50&category=all" | tee response.json
          python - <<'PY'
          import json
          data=json.load(open('response.json'))
          assert 'layers' in data, data
          print('layers:', len(data['layers']))
          PY
      - name: Check events endpoint
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          curl -fsS "$API_BASE_URL/events?lat=45.0703&lon=7.6869&radius_km=50&days=180&animal_filter=all" | tee events.json
          python - <<'PY'
          import json
          data=json.load(open('events.json'))
          assert 'events' in data, data
          print('events:', len(data['events']))
          PY
