name: vet.ector official historical sources refresh

on:
  schedule:
    - cron: "20 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  OFFICIAL_SOURCES_DIR: data/official_sources

jobs:
  refresh-official-sources:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run official historical sources pipeline
        env:
          WAHIS_SOURCE_CSV_URL: ${{ secrets.WAHIS_SOURCE_CSV_URL }}
          ADIS_SOURCE_CSV_URL: ${{ secrets.ADIS_SOURCE_CSV_URL }}
          OFFICIAL_SOURCES_DIR: ${{ env.OFFICIAL_SOURCES_DIR }}
        run: |
          python scripts/official_historical_sources_pipeline.py --dir "$OFFICIAL_SOURCES_DIR"

      - name: Validate official source CSVs
        run: |
          python scripts/validate_official_sources.py --dir "$OFFICIAL_SOURCES_DIR"

      - name: Commit updated official source CSVs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Refresh official historical source CSVs"
          file_pattern: data/official_sources/*.csv data/official_sources/*.json
