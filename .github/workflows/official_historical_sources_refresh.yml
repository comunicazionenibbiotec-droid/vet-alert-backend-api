name: vet.ector official historical sources refresh

on:
  schedule:
    # Daily at 02:20 UTC
    - cron: "20 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-official-sources:
    runs-on: ubuntu-latest
    env:
      OFFICIAL_SOURCES_DIR: backend/data/official_sources
      WAHIS_SOURCE_CSV_URL: ${{ secrets.WAHIS_SOURCE_CSV_URL }}
      ADIS_SOURCE_CSV_URL: ${{ secrets.ADIS_SOURCE_CSV_URL }}
      MAX_VISIBLE_DAYS: "365"
      KEEP_ARCHIVE: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh WAHIS/ADIS official historical sources
        run: python scripts/official_historical_sources_pipeline.py

      - name: Validate official source CSVs
        run: python scripts/validate_official_sources.py --dir "$OFFICIAL_SOURCES_DIR"

      - name: Commit updated official sources
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update official WAHIS/ADIS historical sources"
          file_pattern: "backend/data/official_sources/*.csv backend/data/official_sources/*.json backend/data/official_sources/archive/*.csv"
