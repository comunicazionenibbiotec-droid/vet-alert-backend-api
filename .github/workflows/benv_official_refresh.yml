name: BENV official source refresh

on:
  schedule:
    - cron: "25 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  BENV_EXPORTS_DIR: data/raw/benv_exports
  BENV_OUTPUT_CSV: data/official_sources/izs_benv_events.csv
  BENV_REPORT_DIR: data/official_sources
  BACKEND_BASE_URL: ${{ vars.VETECTOR_BACKEND_BASE_URL || 'https://vet-alert-api-v2.onrender.com' }}
  BACKEND_SYNC_ENABLED: ${{ vars.VETECTOR_BACKEND_SYNC_ENABLED || 'false' }}
  AFTER_DEPLOY_WAIT_SECONDS: ${{ vars.VETECTOR_AFTER_DEPLOY_WAIT_SECONDS || '120' }}

jobs:
  refresh-benv-official-source:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas openpyxl requests

      - name: Ensure expected directories exist
        run: |
          mkdir -p "$BENV_EXPORTS_DIR"
          mkdir -p "$BENV_REPORT_DIR"

      - name: Build BENV official CSV and reports
        run: |
          python scripts/benv_xlsx_to_vetector_csv.py \
            --input-dir "$BENV_EXPORTS_DIR" \
            --output "$BENV_OUTPUT_CSV" \
            --report-dir "$BENV_REPORT_DIR"

      - name: Validate generated BENV CSV
        run: |
          python scripts/validate_italy_sources.py "$BENV_OUTPUT_CSV"

      - name: Commit updated BENV files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Refresh BENV official source files"
          file_pattern: |
            data/official_sources/izs_benv_events.csv
            data/official_sources/benv_geocoding_report.csv
            data/official_sources/benv_import_report.csv
            data/official_sources/benv_companion_report.csv
            data/official_sources/benv_refresh_metadata.json
            data/official_sources/benv_backend_sync_status.json

      - name: Trigger Render deploy hook if configured (non-blocking)
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "No RENDER_DEPLOY_HOOK_URL secret configured; skipping Render deploy."
            exit 0
          fi

          echo "Triggering Render deploy hook..."
          set +e
          HTTP_CODE=$(curl -sS -o /tmp/render_deploy_response.txt -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK_URL")
          CURL_EXIT=$?
          set -e

          echo "Render deploy hook HTTP status: $HTTP_CODE"
          if [ -s /tmp/render_deploy_response.txt ]; then
            echo "Render deploy hook response preview:"
            head -c 600 /tmp/render_deploy_response.txt || true
            echo ""
          fi

          if [ "$CURL_EXIT" -ne 0 ] || [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "WARNING: Render deploy hook failed or returned non-2xx. Continuing workflow."
            exit 0
          fi

          echo "Render deploy hook triggered successfully."

      - name: Wait for optional Render deploy
        if: ${{ vars.VETECTOR_BACKEND_SYNC_ENABLED == 'true' }}
        run: |
          echo "Waiting ${AFTER_DEPLOY_WAIT_SECONDS}s before backend sync..."
          sleep "$AFTER_DEPLOY_WAIT_SECONDS"

      - name: Trigger backend BENV sync if enabled (non-blocking)
        if: ${{ vars.VETECTOR_BACKEND_SYNC_ENABLED == 'true' }}
        run: |
          python scripts/trigger_backend_sync.py \
            --base-url "$BACKEND_BASE_URL" \
            --endpoint "/sync/izs-benv/run" \
            --output "data/official_sources/benv_backend_sync_status.json" \
            --non-blocking

      - name: Commit backend sync status if changed
        if: ${{ vars.VETECTOR_BACKEND_SYNC_ENABLED == 'true' }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update BENV backend sync status"
          file_pattern: data/official_sources/benv_backend_sync_status.json
